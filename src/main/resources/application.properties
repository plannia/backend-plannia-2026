spring.application.name=backend-plannia

# Perfil activo. 'dev' por defecto → carga application-dev.properties (gitignored) con los secretos locales.
# En Azure: setear SPRING_PROFILES_ACTIVE=prod (no existe ese archivo en el server; usa las App Settings).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Port. Azure App Service inyecta el puerto; si no liga, forzar con la App Setting WEBSITES_PORT.
server.port=${PORT:8080}

# Spring DataSource. En Azure: DATASOURCE_URL / DATASOURCE_USER / DATASOURCE_PASSWORD como App Settings.
# Para Azure Database for PostgreSQL la URL suele necesitar ?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/planniadb}
spring.datasource.username=${DATASOURCE_USER:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD}

# Spring Data JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=upc.com.pe.backendplannia.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT. En Azure: JWT_SECRET como App Setting. SIN default a propósito → la app falla al arrancar si falta.
authorization.jwt.secret=${JWT_SECRET:plannia-dev-jwt-secret-minimum-32-chars}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}

# Spring AI - endpoint compatible con OpenAI. Sirve para TRES escenarios solo cambiando estas 3 vars:
#   - LM Studio local : AI_BASE_URL=http://127.0.0.1:1234            AI_EMBEDDING_MODEL=text-embedding-nomic-embed-text-v1.5
#   - Azure OpenAI    : AI_BASE_URL=https://<recurso>.openai.azure.com/openai   AI_EMBEDDING_MODEL=<deployment>  (Spring añade /v1/embeddings)
#   - OpenAI directo  : AI_BASE_URL=https://api.openai.com           AI_EMBEDDING_MODEL=text-embedding-3-small
# En local lo sobreescribe application-dev.properties; en prod van como App Settings.
spring.ai.openai.api-key=${AI_API_KEY:lm-studio}
spring.ai.openai.base-url=${AI_BASE_URL:https://api.openai.com}
spring.ai.openai.embedding.options.model=${AI_EMBEDDING_MODEL:nomic-embed-text}
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration

# Notifications - Email transport. log = NO envia (default seguro); smtp = Resend real.
notifications.email.transport=${NOTIFICATIONS_EMAIL_TRANSPORT:log}
notifications.email.from=${NOTIFICATIONS_EMAIL_FROM}
notifications.email.max-per-day=${NOTIFICATIONS_EMAIL_MAX_PER_DAY:90}

# SMTP de Resend (solo con transport=smtp). MAIL_PASSWORD = API key de Resend (App Setting en Azure).
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
