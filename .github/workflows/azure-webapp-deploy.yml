name: Build and deploy to Azure Web App

# Publish profile: secreto AZURE_WEBAPP_PUBLISH_PROFILE.
# Si falla con "SCM container restart", el workflow reintenta solo (Kudu se reinicia a veces a mitad del ZIP deploy).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: azure-plannia-production
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: plannia
  JAVA_VERSION: '25'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Deploy to Azure Web App
        id: deploy1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar

      - name: Wait for Kudu (retry 1)
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (retry 1)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar

      - name: Wait for Kudu (retry 2)
        if: steps.deploy2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (retry 2)
        if: steps.deploy2.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar
