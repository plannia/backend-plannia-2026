name: Build and deploy to Azure Web App

# Despliegue manual (sin que Azure escriba en GitHub): este workflow compila el jar y lo publica
# al App Service usando el publish profile guardado como secreto de GitHub.

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

env:
  AZURE_WEBAPP_NAME: plannia        # nombre del App Service (ajusta si cambia)
  JAVA_VERSION: '25'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'target/*.jar'
